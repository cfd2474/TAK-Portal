<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Groups updated</title>
</head>
<body style="font-family: Arial, Helvetica, sans-serif; line-height: 1.45; color: #111;">
  <h2 style="margin: 0 0 12px 0;">Groups updated</h2>

  <p style="margin: 0 0 12px 0;">Hello {{displayName}},</p>

  <p style="margin: 0 0 12px 0;">
    Your group memberships were updated.
  </p>

  <div style="margin: 0 0 12px 0; padding: 12px; border: 1px solid #ddd; border-radius: 6px;">
    <div><strong>Username:</strong> {{username}}</div>
    <div style="margin-top: 8px;"><strong>Previous groups:</strong> {{beforeGroupsCsv}}</div>
    <div><strong>Current groups:</strong> {{afterGroupsCsv}}</div>
  </div>

  <p style="margin: 0 0 12px 0;">
    If you believe this is incorrect, contact an administrator.
  </p>
</body>
</html>
