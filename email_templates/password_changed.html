<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Password changed</title>
</head>
<body style="font-family: Arial, Helvetica, sans-serif; line-height: 1.45; color: #111;">
  <h2 style="margin: 0 0 12px 0;">Password changed</h2>

  <p style="margin: 0 0 12px 0;">Hello {{displayName}},</p>

  <p style="margin: 0 0 12px 0;">
    Your password was changed.
  </p>

  <div style="margin: 0 0 12px 0; padding: 12px; border: 1px solid #ddd; border-radius: 6px;">
    <div><strong>Username:</strong> {{username}}</div>
  </div>

  <p style="margin: 0 0 12px 0;">
    If you did not request this change, contact an administrator immediately.
  </p>
</body>
</html>
