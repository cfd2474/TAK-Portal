<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Account created</title>
</head>
<body style="font-family: Arial, Helvetica, sans-serif; line-height: 1.45; color: #111;">
  <h2 style="margin: 0 0 12px 0;">Account created</h2>

  <p style="margin: 0 0 12px 0;">Hello {{displayName}},</p>

  <p style="margin: 0 0 12px 0;">
    An account has been created for you.
  </p>

  <div style="margin: 0 0 12px 0; padding: 12px; border: 1px solid #ddd; border-radius: 6px;">
    <div><strong>Username:</strong> {{username}}</div>
    <div><strong>Groups:</strong> {{groupsCsv}}</div>
  </div>

  <p style="margin: 0 0 12px 0;">
    If you were not expecting this, please contact an administrator.
  </p>
</body>
</html>
