<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Mutual Aid Created</title>
</head>
<body style="font-family: Arial, Helvetica, sans-serif; line-height: 1.45; color: #111;">
  <h2 style="margin: 0 0 12px 0;">Mutual Aid Created</h2>

  <p style="margin: 0 0 12px 0;">
    A new Mutual Aid <strong>{{type}}</strong> was created.
  </p>

  <div style="margin: 0 0 12px 0; padding: 12px; border: 1px solid #ddd; border-radius: 6px;">
    <div><strong>Type:</strong> {{type}}</div>
    <div><strong>Name:</strong> {{title}}</div>
    <div><strong>Group:</strong> {{groupName}}</div>
    <div><strong>Username:</strong> {{username}}</div>
    <div><strong>Password:</strong> {{password}}</div>
  </div>

  <p style="margin: 0 0 12px 0;">
    <strong>Enroll URL:</strong><br />
    <a href="{{enrollUrl}}">{{enrollUrl}}</a>
  </p>

  <p style="margin: 0 0 12px 0;"><strong>Enrollment QR Code:</strong></p>
  <p style="margin: 0 0 12px 0;">
    <img src="{{qrDataUrl}}" alt="TAK Enrollment QR" style="max-width: 420px; width: 100%; height: auto;" />
  </p>

  <hr />
  <p style="color: #666; font-size: 12px; margin: 12px 0 0 0;">
    Sent by TAK User Admin Portal
  </p>
</body>
</html>
